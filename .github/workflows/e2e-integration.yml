name: E2E Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  smoke-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: |
          python -m pytest -q tests/test_messaging.py tests/test_file_transfer.py tests/test_media.py tests/test_web_server.py

      - name: Run multiprocess integration
        run: |
          python -m pytest -q tests/test_integration_multiprocess.py
